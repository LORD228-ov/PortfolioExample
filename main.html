<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Template</title>
    <!-- Main stylesheet link (edit path if moving file) -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- BOOTSTRAP CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- HERO SECTION WIREFRAME -->
    <section class="container py-5 border rounded mt-4">
        <h3 class="text-center mb-4">Hero Section (Wireframe)</h3>
        <div class="row align-items-center">
            <div class="col-md-4 text-center">
                <!-- Placeholder Avatar -->
<div class="avatar-wrapper mx-auto">
    <img src="assets/portfolioLogo.jpg" alt="avatar" class="avatar-img">
</div>
                <p class="text-muted mt-2">Avatar Placeholder</p>
            </div>
            <div class="col-md-8">
                <div class="placeholder-glow">
                    <span class="placeholder col-6"></span>
                    <span class="placeholder col-4"></span>
                    <span class="placeholder col-8"></span>
                </div>
                <p class="placeholder col-10 mt-3"></p>
            </div>
        </div>
    </section>

    <!-- ABOUT SECTION WIREFRAME -->
    <section class="container py-5 border rounded mt-4">
        <h3 class="text-center mb-4">About Section (Wireframe)</h3>
        <div class="placeholder-glow">
            <p class="placeholder col-8"></p>
            <p class="placeholder col-10"></p>
            <p class="placeholder col-6"></p>
        </div>
    </section>

    <!-- WORK EXPERIENCE WIREFRAME -->
    <section class="container py-5 border rounded mt-4 mb-5">
        <h3 class="text-center mb-4">Work Experience</h3>
        <div class="row g-4">
            <div class="col-md-6 col-lg-3">
                <a href="https://example1.com" target="_blank" class="text-decoration-none text-dark">
                    <div class="border rounded p-3 text-center h-100">
                        <div class="bg-secondary mb-3" style="height:80px;"></div>
                        <p class="fw-bold">Project / Company 1</p>
                        <p class="text-muted">Short description for item 1</p>
                    </div>
                </a>
            </div>
            <div class="col-md-6 col-lg-3">
                <a href="https://example2.com" target="_blank" class="text-decoration-none text-dark">
                    <div class="border rounded p-3 text-center h-100">
                        <div class="bg-secondary mb-3" style="height:80px;"></div>
                        <p class="fw-bold">Project / Company 2</p>
                        <p class="text-muted">Short description for item 2</p>
                    </div>
                </a>
            </div>
            <div class="col-md-6 col-lg-3">
                <a href="https://example3.com" target="_blank" class="text-decoration-none text-dark">
                    <div class="border rounded p-3 text-center h-100">
                        <div class="bg-secondary mb-3" style="height:80px;"></div>
                        <p class="fw-bold">Project / Company 3</p>
                        <p class="text-muted">Short description for item 3</p>
                    </div>
                </a>
            </div>
            <div class="col-md-6 col-lg-3">
                <a href="https://example4.com" target="_blank" class="text-decoration-none text-dark">
                    <div class="border rounded p-3 text-center h-100">
                        <div class="bg-secondary mb-3" style="height:80px;"></div>
                        <p class="fw-bold">Project / Company 4</p>
                        <p class="text-muted">Short description for item 4</p>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <!-- BOOTSTRAP JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
